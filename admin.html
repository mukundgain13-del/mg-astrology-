<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG ASTROLOGY - Admin Panel</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background-color: #efeae2; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        .admin-container { 
            background: white; 
            width: 100%; 
            max-width: 450px; 
            height: 100vh; 
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .admin-header {
            background-color: #008069; 
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #005e4e;
        }

        .header-title { font-size: 20px; font-weight: bold; letter-spacing: 1px; }
        
        .top-block-btn {
            display: none; 
            background-color: #d32f2f;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .search-box-area {
            padding: 10px 15px;
            background-color: #f0f2f5;
            border-bottom: 1px solid #e1e9eb;
        }
        .search-input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
            font-size: 15px;
        }

        .customer-list {
            flex: 1;
            overflow-y: auto; 
            background-color: white;
        }

        .no-customer-msg {
            text-align: center;
            color: #667781;
            font-size: 15px;
            margin-top: 40px;
            padding: 0 20px;
            line-height: 1.6;
        }

        .customer-item {
            padding: 15px 20px;
            border-bottom: 1px solid #f0f2f5;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .customer-item:hover { background-color: #f5f6f6; }
        .customer-item.selected { background-color: #e1f5fe; border-left: 5px solid #0288d1; }

        /* FULL CHAT WINDOW */
        .full-chat-window {
            display: none; 
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #efeae2;
            z-index: 100;
            flex-direction: column;
        }

        .inner-chat-header {
            background-color: #008069;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #005e4e;
        }
        .back-btn { font-size: 22px; cursor: pointer; background: none; border: none; color: white; outline: none; }
        .inner-chat-title { font-size: 20px; font-weight: bold; }
        
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message { max-width: 85%; padding: 10px 14px; border-radius: 8px; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
        .msg-right { background-color: #d9fdd3; color: #333; align-self: flex-end; border-top-right-radius: 0; box-shadow: 0 1px 2px rgba(0,0,0,0.15); }

        /* QR कोड की फोटो को सुंदर दिखाने के लिए स्टाइल */
        .qr-image-style {
            width: 100%;
            max-width: 200px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: block;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .quick-reply-bar {
            background-color: #fff;
            padding: 8px 10px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #e1e9eb;
        }
        .quick-btn-qr {
            background-color: #ffeedd;
            color: #d32f2f;
            border: 1px solid #ffcc80;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            text-align: center;
            outline: none;
        }

        .chat-input-bar {
            background-color: #f0f2f5;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #e1e9eb;
        }
        .chat-input { flex: 1; padding: 12px 15px; border: 1px solid white; border-radius: 20px; font-size: 16px; outline: none; }
        .send-btn { background-color: #00a884; color: white; border: none; width: 42px; height: 42px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; outline: none; }
    </style>
</head>
<body>

    <div class="admin-container">
        
        <div class="admin-header">
            <div class="header-title" id="mainHeaderTitle">MG ASTROLOGY - ADMIN</div>
            <button class="top-block-btn" id="topBlockBtn" onclick="blockSelectedCustomer()">🚫 Block करें</button>
        </div>

        <div class="search-box-area">
            <input type="text" class="search-input" placeholder="🔍 कस्टमर का नाम या नंबर ढूंढें...">
        </div>

        <div class="customer-list" id="customerListWindow">
            <div class="no-customer-msg" id="emptyNotice">
                💬 अभी कोई नया संदेश नहीं है।<br>जब कोई ग्राहक लॉगिन करेगा, उसकी चैट यहाँ दिखाई देगी।
            </div>
        </div>

        <div class="full-chat-window" id="fullChatWindow">
            <div class="inner-chat-header">
                <button class="back-btn" onclick="closeCustomerChat()">⬅</button>
                <div class="inner-chat-title" id="chattingWithTitle">कस्टमर चैट</div>
            </div>
            
            <div class="chat-messages" id="adminChatWindow"></div>

            <div class="quick-reply-bar">
                <button class="quick-btn-qr" onclick="sendPaymentWarning()">📸 भुगतान चेतावनी संदेश भेजें</button>
            </div>

            <div class="chat-input-bar">
                <input type="text" class="chat-input" id="adminMsgInput" placeholder="अपना उत्तर टाइप करें...">
                <button class="send-btn" onclick="adminSendMessage()">➤</button>
            </div>
        </div>

    </div>

    <script>
        var selectedCustomerId = null;
        var selectedCustomerName = "";

        function selectCustomer(id, name) {
            var items = document.getElementsByClassName('customer-item');
            for(var i=0; i<items.length; i++) { items[i].classList.remove('selected'); }

            document.getElementById(id).classList.add('selected');
            selectedCustomerId = id;
            selectedCustomerName = name;

            document.getElementById('topBlockBtn').style.display = 'block';
            document.getElementById('mainHeaderTitle').innerText = "चयनित: " + name;
        }

        function blockSelectedCustomer() {
            if(selectedCustomerId) {
                var confirmBlock = confirm("क्या आप सचमुच " + selectedCustomerName + " को हमेशा के लिए ब्लॉक करना चाहते हैं?");
                if(confirmBlock) {
                    document.getElementById(selectedCustomerId).remove();
                    alert(selectedCustomerName + " ब्लॉक हो गया!");
                    resetAdminHeader();
                }
            }
        }

        function resetAdminHeader() {
            selectedCustomerId = null;
            document.getElementById('topBlockBtn').style.display = 'none';
            document.getElementById('mainHeaderTitle').innerText = "MG ASTROLOGY - ADMIN";
        }

        function openCustomerChat(name) {
            document.getElementById('chattingWithTitle').innerText = name;
            document.getElementById('fullChatWindow').style.display = 'flex';
        }

        function closeCustomerChat() {
            document.getElementById('fullChatWindow').style.display = 'none';
            resetAdminHeader();
        }

        // 🚀 मुकुंद जी, यहाँ आपका असली QR कोड और कड़क चेतावनी दोनों एक साथ जुड़ गए हैं
        function sendPaymentWarning() {
            var chatWindow = document.getElementById('adminChatWindow');
            var newMsg = document.createElement('div');
            newMsg.className = "message msg-right";
            
            // चेतावनी टेक्स्ट और साथ में आपका भेजा हुआ डायरेक्ट इमेज लिंक
            var warningText = '<img src="https://i.ibb.co/SDBfnhQy/Screenshot-20260517-164027-GPay-Business.jpg" class="qr-image-style" alt="GPay QR Code">' +
                              '<span style="color: #d32f2f; font-weight: bold; display: block;">⚠️ ध्यान दें: कृपया ऊपर दिए गए QR कोड पर भुगतान करके तुरंत स्क्रीनशॉट साझा करें, तभी आपकी बाकी रिपोर्ट आपको मिलेगी।</span>';
            
            newMsg.innerHTML = warningText;
            chatWindow.appendChild(newMsg);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function adminSendMessage() {
            var input = document.getElementById('adminMsgInput');
            var text = input.value.trim();
            if(text === "") return;

            var chatWindow = document.getElementById('adminChatWindow');
            var newMsg = document.createElement('div');
            newMsg.className = "message msg-right";
            newMsg.innerText = text;

            chatWindow.appendChild(newMsg);
            input.value = "";
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>

</body>
</html>
