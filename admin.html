<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG ASTROLOGY - Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background-color: #efeae2; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        .admin-container { 
            background: white; 
            width: 100%; 
            max-width: 450px; 
            height: 100vh; 
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .admin-header {
            background-color: #008069; 
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #005e4e;
        }

        .header-title { font-size: 20px; font-weight: bold; letter-spacing: 1px; }
        
        .top-block-btn {
            display: none; 
            background-color: #d32f2f;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .search-box-area {
            padding: 10px 15px;
            background-color: #f0f2f5;
            border-bottom: 1px solid #e1e9eb;
        }
        .search-input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
            font-size: 15px;
        }

        .customer-list {
            flex: 1;
            overflow-y: auto; 
            background-color: white;
        }

        .no-customer-msg {
            text-align: center;
            color: #667781;
            font-size: 15px;
            margin-top: 40px;
            padding: 0 20px;
            line-height: 1.6;
        }

        .customer-item {
            padding: 15px 20px;
            border-bottom: 1px solid #f0f2f5;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .customer-item:hover { background-color: #f5f6f6; }
        .customer-item.selected { background-color: #e1f5fe; border-left: 5px solid #0288d1; }

        /* FULL CHAT WINDOW */
        .full-chat-window {
            display: none; 
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #efeae2;
            z-index: 100;
            flex-direction: column;
        }

        .inner-chat-header {
            background-color: #008069;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #005e4e;
        }
        .back-btn { font-size: 22px; cursor: pointer; background: none; border: none; color: white; outline: none; }
        .inner-chat-title { font-size: 20px; font-weight: bold; }
        
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message { max-width: 85%; padding: 10px 14px; border-radius: 8px; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
        .msg-right { background-color: #d9fdd3; color: #333; align-self: flex-end; border-top-right-radius: 0; box-shadow: 0 1px 2px rgba(0,0,0,0.15); }
        .msg-left { background-color: white; color: #333; align-self: flex-start; border-top-left-radius: 0; box-shadow: 0 1px 2px rgba(0,0,0,0.15); }

        /* भेजी गई इमेज और QR कोड का सुंदर साइज */
        .qr-image-style, .chat-img-admin {
            width: 100%;
            max-width: 180px;
            max-height: 180px;
            border-radius: 8px;
            margin-bottom: 5px;
            display: block;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .quick-reply-bar {
            background-color: #fff;
            padding: 8px 10px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #e1e9eb;
        }
        .quick-btn-qr {
            background-color: #ffeedd;
            color: #d32f2f;
            border: 1px solid #ffcc80;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            text-align: center;
            outline: none;
        }

        .chat-input-bar {
            background-color: #f0f2f5;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #e1e9eb;
        }
        
        /* एडमिन के लिए पिन/गैलरी बटन की डिज़ाइन */
        .admin-upload-btn {
            background: none;
            border: none;
            font-size: 22px;
            color: #54656f;
            cursor: pointer;
            outline: none;
            display: flex;
            align-items: center;
        }
        
        .chat-input { flex: 1; padding: 12px 15px; border: 1px solid white; border-radius: 20px; font-size: 16px; outline: none; }
        .send-btn { background-color: #00a884; color: white; border: none; width: 42px; height: 42px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; outline: none; }
    </style>
</head>
<body>

    <div class="admin-container">
        
        <div class="admin-header">
            <div class="header-title" id="mainHeaderTitle">MG ASTROLOGY - ADMIN</div>
            <button class="top-block-btn" id="topBlockBtn" onclick="blockSelectedCustomer()">🚫 Block करें</button>
        </div>

        <div class="search-box-area">
            <input type="text" class="search-input" placeholder="🔍  कस्टमर का नाम या नंबर ढूंढें...">
        </div>

        <div class="customer-list" id="customerListWindow">
            <div class="no-customer-msg" id="emptyNotice">
                💬 अभी कोई नया संदेश नहीं है।<br>जब कोई ग्राहक मैसेज भेजेगा, उसकी चैट यहाँ दिखाई देगी।
            </div>
        </div>

        <div class="full-chat-window" id="fullChatWindow">
            <div class="inner-chat-header">
                <button class="back-btn" onclick="closeCustomerChat()">⬅</button>
                <div class="inner-chat-title" id="chattingWithTitle">कस्टमर चैट</div>
            </div>
            
            <div class="chat-messages" id="adminChatWindow"></div>

            <div class="quick-reply-bar">
                <button class="quick-btn-qr" onclick="sendPaymentWarning()">📸 भुगतान चेतावनी संदेश भेजें</button>
            </div>

            <div class="chat-input-bar">
                <button class="admin-upload-btn" onclick="openAdminGallery()">📎</button>
                <input type="file" id="adminGalleryInput" accept="image/*" style="display:none;" onchange="adminImageSelected()">
                
                <input type="text" class="chat-input" id="adminMsgInput" placeholder="अपना उत्तर टाइप करें...">
                <button class="send-btn" onclick="adminSendMessage()">➤</button>
            </div>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBYCVE3YIwhu1kCA0ITLiOr-BXGQeA8cB8",
            authDomain: "mg-astrology.firebaseapp.com",
            projectId: "mg-astrology",
            storageBucket: "mg-astrology.firebasestorage.app",
            messagingSenderId: "261563877993",
            appId: "1:261563877993:web:b0ce3be4f40521a78ef0f8",
            measurementId: "G-9BXEP9NB0C",
            databaseURL: "https://mg-astrology-default-rtdb.firebaseio.com/"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        var selectedCustomerId = null;
        var selectedCustomerName = "";
        var initialLoadDone = false; 

        // लाइव नोटिफिकेशन घंटी के लिए ऑडियो टोन
        const notificationSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2357/2357-84.wav');

        // ब्राउज़र परमिशन मांगना नोटिफिकेशन के लिए
        if (Notification.permission !== "granted") {
            Notification.requestPermission();
        }

        // 🚀 लाइव डेटाबेस से ग्राहकों के मैसेज खींचने का सिस्टम
        database.ref('chats').on('value', (snapshot) => {
            const customerListWindow = document.getElementById('customerListWindow');
            const emptyNotice = document.getElementById('emptyNotice');
            
            customerListWindow.innerHTML = '';
            
            if (snapshot.exists()) {
                if(emptyNotice) emptyNotice.style.display = 'none';
                
                var item = document.createElement('div');
                item.className = "customer-item";
                item.id = "customer_1";
                item.innerHTML = '<strong>🔮 लाइव कस्टमर (Live Chat)</strong><span style="font-size:13px; color:#667781;">क्लिक करके नया मैसेज देखें</span>';
                
                item.onclick = function() {
                    selectCustomer('customer_1', 'कस्टमर');
                    openCustomerChat('कस्टमर');
                };
                
                customerListWindow.appendChild(item);

                // घंटी बजाने का लॉजिक: अगर पहला लोड हो चुका है और कोई नया मैसेज कस्टमर की तरफ से जुड़ता है
                if (initialLoadDone) {
                    var allMsgs = snapshot.val();
                    var keys = Object.keys(allMsgs);
                    var lastMsg = allMsgs[keys[keys.length - 1]];
                    if(lastMsg && lastMsg.sender === "customer") {
                        notificationSound.play().catch(e => console.log("Sound error")); // प्यारी घंटी बजेगी
                        if (Notification.permission === "granted") {
                            new Notification("MG ASTROLOGY", { body: "कस्टमर का नया संदेश आया है!", icon: "https://i.ibb.co/SDBfnhQy/Screenshot-20260517-164027-GPay-Business.jpg" });
                        }
                    }
                }
                initialLoadDone = true;

                if(selectedCustomerId === 'customer_1') {
                    loadLiveMessages(snapshot.val());
                }
            } else {
                customerListWindow.appendChild(emptyNotice);
                if(emptyNotice) emptyNotice.style.display = 'block';
                initialLoadDone = true;
            }
        });

        // सुधरा हुआ मैसेज रेंडर फंक्शन: जो अंग्रेजी कोड को असली फोटो में बदलता है
        function loadLiveMessages(messagesData) {
            var chatWindow = document.getElementById('adminChatWindow');
            chatWindow.innerHTML = ''; 

            Object.keys(messagesData).forEach((key) => {
                var msg = messagesData[key];
                var newMsg = document.createElement('div');
                
                if(msg.sender === "admin") {
                    newMsg.className = "message msg-right";
                    if(msg.text.includes('<img') || msg.text.startsWith('data:image')) {
                        if(msg.text.startsWith('data:image')) {
                            newMsg.innerHTML = `<img src="${msg.text}" class="chat-img-admin">`;
                        } else {
                            newMsg.innerHTML = msg.text;
                        }
                    } else {
                        newMsg.innerText = msg.text;
                    }
                } else {
                    // ग्राहक का मैसेज - अगर फोटो कोड (Base64) है तो असली फोटो दिखाओ!
                    newMsg.className = "message msg-left";
                    if(msg.fileType === "image" || msg.text.startsWith('data:image')) {
                        newMsg.innerHTML = `<img src="${msg.text}" class="chat-img-admin" style="cursor:pointer;" onclick="window.open('${msg.text}', '_blank')">`;
                    } else {
                        newMsg.innerText = msg.text;
                    }
                }
                
                chatWindow.appendChild(newMsg);
            });
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function selectCustomer(id, name) {
            var items = document.getElementsByClassName('customer-item');
            for(var i=0; i<items.length; i++) { items[i].classList.remove('selected'); }

            var currentItem = document.getElementById(id);
            if(currentItem) currentItem.classList.add('selected');
            
            selectedCustomerId = id;
            selectedCustomerName = name;

            document.getElementById('topBlockBtn').style.display = 'block';
            document.getElementById('mainHeaderTitle').innerText = "चयनित: " + name;
        }

        // पूरा फोल्डर और इतिहास उड़ाने वाला डिलीट/ब्लॉक सिस्टम
        function blockSelectedCustomer() {
            if(selectedCustomerId) {
                var confirmBlock = confirm("क्या आप सचमुच " + selectedCustomerName + " का पूरा फोल्डर और चैट हमेशा के लिए डिलीट करना चाहते हैं?");
                if(confirmBlock) {
                    database.ref('chats').remove().then(() => {
                        alert(selectedCustomerName + " का पूरा फोल्डर साफ़ कर दिया गया है!");
                        closeCustomerChat();
                    });
                }
            }
        }

        function resetAdminHeader() {
            selectedCustomerId = null;
            document.getElementById('topBlockBtn').style.display = 'none';
            document.getElementById('mainHeaderTitle').innerText = "MG ASTROLOGY - ADMIN";
        }

        function openCustomerChat(name) {
            document.getElementById('chattingWithTitle').innerText = name;
            document.getElementById('fullChatWindow').style.display = 'flex';
            
            database.ref('chats').once('value', (snapshot) => {
                if(snapshot.exists()) {
                    loadLiveMessages(snapshot.val());
                }
            });
        }

        function closeCustomerChat() {
            document.getElementById('fullChatWindow').style.display = 'none';
            resetAdminHeader();
        }

        function sendPaymentWarning() {
            var warningText = '<img src="https://i.ibb.co/SDBfnhQy/Screenshot-20260517-164027-GPay-Business.jpg" class="qr-image-style" alt="GPay QR Code">' +
                              '<span style="color: #d32f2f; font-weight: bold; display: block;">⚠️ ध्यान दें: कृपया ऊपर दिए गए QR कोड पर भुगतान करके तुरंत स्क्रीनशॉट साझा करें, तभी आपकी बाकी रिपोर्ट आपको मिलेगी।</span>';
            
            var messageData = {
                sender: "admin",
                text: warningText,
                timestamp: Date.now()
            };

            database.ref('chats').push(messageData);
        }

        // एडमिन के लिए गैलरी खोलने और फोटो सेंड करने का सिस्टम
        function openAdminGallery() {
            document.getElementById('adminGalleryInput').click();
        }

        function adminImageSelected() {
            var fileInput = document.getElementById('adminGalleryInput');
            if(fileInput.files.length > 0) {
                var file = fileInput.files[0];
                var reader = new FileReader();
                
                reader.onload = function(e) {
                    var base64Image = e.target.result;
                    var messageData = { 
                        sender: "admin", 
                        text: base64Image, 
                        timestamp: Date.now() 
                    };
                    database.ref('chats').push(messageData).then(() => {
                        fileInput.value = ""; 
                    });
                };
                reader.readAsDataURL(file);
            }
        }

        function adminSendMessage() {
            var input = document.getElementById('adminMsgInput');
            var text = input.value.trim();
            if(text === "") return;

            var messageData = {
                sender: "admin",
                text: text,
                timestamp: Date.now()
            };

            database.ref('chats').push(messageData)
            .then(() => {
                input.value = "";
            });
        }
    </script>

</body>
</html>
