<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG ASTROLOGY - Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background-color: #efeae2; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        .admin-container { 
            background: white; 
            width: 100%; 
            max-width: 450px; 
            height: 100vh; 
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .admin-header {
            background-color: #008069; 
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #005e4e;
        }

        .header-title { font-size: 20px; font-weight: bold; letter-spacing: 1px; }
        
        .top-block-btn {
            display: none; 
            background-color: #d32f2f;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .search-box-area {
            padding: 10px 15px;
            background-color: #f0f2f5;
            border-bottom: 1px solid #e1e9eb;
        }
        .search-input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
            font-size: 15px;
        }

        .customer-list {
            flex: 1;
            overflow-y: auto; 
            background-color: white;
        }

        .no-customer-msg {
            text-align: center;
            color: #667781;
            font-size: 15px;
            margin-top: 40px;
            padding: 0 20px;
            line-height: 1.6;
        }

        .customer-item {
            padding: 15px 20px;
            border-bottom: 1px solid #f0f2f5;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .customer-item:hover { background-color: #f5f6f6; }
        .customer-item.selected { background-color: #e1f5fe; border-left: 5px solid #0288d1; }

        /* FULL CHAT WINDOW */
        .full-chat-window {
            display: none; 
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #efeae2;
            background-image: 
                radial-gradient(rgba(0, 128, 105, 0.05) 1.5px, transparent 1.5px), 
                radial-gradient(rgba(212, 175, 55, 0.06) 1px, transparent 1px);
            background-size: 40px 40px, 60px 60px;
            background-position: 0 0, 20px 20px;
            z-index: 100;
            flex-direction: column;
        }

        .inner-chat-header {
            background-color: #008069;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #005e4e;
        }
        .back-btn { font-size: 22px; cursor: pointer; background: none; border: none; color: white; outline: none; }
        .inner-chat-title { font-size: 20px; font-weight: bold; }
        
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message { max-width: 85%; padding: 10px 14px; border-radius: 8px; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
        .msg-right { background-color: rgba(217, 253, 211, 0.98); color: #333; align-self: flex-end; border-top-right-radius: 0; box-shadow: 0 1px 2px rgba(0,0,0,0.15); }
        .msg-left { background-color: rgba(255, 255, 255, 0.98); color: #333; align-self: flex-start; border-top-left-radius: 0; box-shadow: 0 1px 2px rgba(0,0,0,0.15); }

        .qr-image-style, .chat-img-admin {
            width: 100%;
            max-width: 180px;
            max-height: 180px;
            border-radius: 8px;
            margin-bottom: 5px;
            display: block;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .quick-reply-bar {
            background-color: #fff;
            padding: 8px 10px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #e1e9eb;
        }
        .quick-btn-qr {
            background-color: #ffeedd;
            color: #d32f2f;
            border: 1px solid #ffcc80;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            text-align: center;
            outline: none;
        }

        .chat-input-bar {
            background-color: #f0f2f5;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #e1e9eb;
        }
        
        .admin-upload-btn {
            background: none;
            border: none;
            font-size: 22px;
            color: #54656f;
            cursor: pointer;
            outline: none;
            display: flex;
            align-items: center;
        }
        
        .chat-input { flex: 1; padding: 12px 15px; border: 1px solid white; border-radius: 20px; font-size: 16px; outline: none; }
        .send-btn { background-color: #00a884; color: white; border: none; width: 42px; height: 42px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; outline: none; }
    </style>
</head>
<body>

    <div class="admin-container">
        
        <div class="admin-header">
            <div class="header-title" id="mainHeaderTitle">MG ASTROLOGY - ADMIN</div>
            <button class="top-block-btn" id="topBlockBtn" onclick="blockSelectedCustomer()">🚫 Block करें</button>
        </div>

        <div class="search-box-area">
            <input type="text" id="adminSearchInput" class="search-input" placeholder="🔍  कस्टमर का नाम या नंबर ढूंढें..." oninput="filterCustomers()">
        </div>

        <div class="customer-list" id="customerListWindow">
            <div class="no-customer-msg" id="emptyNotice">
                💬 अभी कोई नया संदेश नहीं है।<br>जब कोई ग्राहक मैसेज भेजेगा, उसकी चैट यहाँ दिखाई देगी।
            </div>
        </div>

        <div class="full-chat-window" id="fullChatWindow">
            <div class="inner-chat-header">
                <button class="back-btn" onclick="closeCustomerChat()">⬅</button>
                <div class="inner-chat-title" id="chattingWithTitle">कस्टमर चैट</div>
            </div>
            
            <div class="chat-messages" id="adminChatWindow"></div>

            <div class="quick-reply-bar">
                <button class="quick-btn-qr" onclick="sendPaymentWarning()">📸 भुगतान चेतावनी संदेश भेजें</button>
            </div>

            <div class="chat-input-bar">
                <button class="admin-upload-btn" onclick="openAdminGallery()">📎</button>
                <input type="file" id="adminGalleryInput" accept="image/*" style="display:none;" onchange="adminImageSelected()">
                
                <input type="text" class="chat-input" id="adminMsgInput" placeholder="अपना उत्तर टाइप करें...">
                <button class="send-btn" onclick="adminSendMessage()">➤</button>
            </div>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBYCVE3YIwhu1kCA0ITLiOr-BXGQeA8cB8",
            authDomain: "mg-astrology.firebaseapp.com",
            projectId: "mg-astrology",
            storageBucket: "mg-astrology.firebasestorage.app",
            messagingSenderId: "261563877993",
            appId: "1:261563877993:web:b0ce3be4f40521a78ef0f8",
            measurementId: "G-9BXEP9NB0C",
            databaseURL: "https://mg-astrology-default-rtdb.firebaseio.com/"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        var selectedCustomerId = null;
        var selectedCustomerName = "";
        var lastMessagesCounts = {}; 
        var initialLoadDone = false; 
        var currentLiveRef = null; 

        const notificationSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2357/2357-84.wav');

        if (Notification.permission !== "granted") {
            Notification.requestPermission();
        }

        // 🚀 अपडेटेड लिस्ट लोड: अब यह फायरबेस से नाम और नंबर दोनों एक साथ लोड करेगा
        database.ref('chats').on('value', (snapshot) => {
            const customerListWindow = document.getElementById('customerListWindow');
            const emptyNotice = document.getElementById('emptyNotice');
            
            customerListWindow.innerHTML = '';
            
            if (snapshot.exists()) {
                if(emptyNotice) emptyNotice.style.display = 'none';
                
                var rooms = snapshot.val();
                var hasRooms = false;

                Object.keys(rooms).forEach((roomKey) => {
                    if(roomKey === 'apiKey' || roomKey === 'authDomain' || roomKey === 'projectId' || roomKey === 'storageBucket' || roomKey === 'messagingSenderId' || roomKey === 'appId' || roomKey === 'measurementId' || typeof rooms[roomKey] !== 'object') return;

                    hasRooms = true;
                    var roomData = rooms[roomKey];
                    var keys = Object.keys(roomData);
                    
                    // आखरी मैसेज निकालते समय प्रोफाइल डेटा को छोड़ दें
                    var lastMsg = null;
                    for(var i = keys.length - 1; i >= 0; i--) {
                        if(keys[i] !== 'cust_profile' && roomData[keys[i]].sender) {
                            lastMsg = roomData[keys[i]];
                            break;
                        }
                    }
                    
                    // ग्राहक का नाम प्रोफाइल से निकालें, नहीं मिलने पर "नया ग्राहक" दिखाएँ
                    var savedName = (roomData.cust_profile && roomData.cust_profile.name) ? roomData.cust_profile.name : "नया ग्राहक";
                    var displayTitle = savedName + " (" + roomKey + ")";
                    
                    if (initialLoadDone) {
                        var currentCount = keys.length;
                        var oldCount = lastMessagesCounts[roomKey] || 0;
                        if (currentCount > oldCount && lastMsg && lastMsg.sender === "customer") {
                            notificationSound.play().catch(e => console.log("Sound error"));
                            if (Notification.permission === "granted") {
                                new Notification("MG ASTROLOGY", { body: "नया संदेश: " + savedName });
                            }
                        }
                    }
                    lastMessagesCounts[roomKey] = keys.length;

                    var item = document.createElement('div');
                    item.className = "customer-item";
                    item.id = "room_" + roomKey;
                    if(selectedCustomerId === "room_" + roomKey) {
                        item.classList.add('selected');
                    }
                    
                    var msgPreview = "";
                    if(lastMsg) {
                        if(lastMsg.fileType === 'image' || lastMsg.text.startsWith('data:image')) {
                            msgPreview = '📸 फोटो भेजी है';
                        } else if(lastMsg.text.includes('<img')) {
                            msgPreview = '📸 भुगतान चेतावनी / QR कोड';
                        } else {
                            msgPreview = lastMsg.text.substring(0, 25);
                        }
                    }
                    
                    item.innerHTML = `<strong>🔮 ${displayTitle}</strong><span style="font-size:13px; color:#667781;">मैसेज: ${msgPreview}</span>`;
                    
                    item.onclick = function() {
                        selectCustomer("room_" + roomKey, savedName);
                        openCustomerChat(roomKey);
                    };
                    
                    customerListWindow.appendChild(item);
                });

                if(!hasRooms) {
                    showEmptyScreen(emptyNotice);
                }
                initialLoadDone = true;
            } else {
                showEmptyScreen(emptyNotice);
                initialLoadDone = true;
            }
        });

        function showEmptyScreen(emptyNotice) {
            const customerListWindow = document.getElementById('customerListWindow');
            customerListWindow.innerHTML = '';
            if(emptyNotice) {
                customerListWindow.appendChild(emptyNotice);
                emptyNotice.style.display = 'block';
            }
        }

        function listenToLiveMessages(roomKey) {
            var chatWindow = document.getElementById('adminChatWindow');
            chatWindow.innerHTML = ''; 

            if (currentLiveRef) {
                currentLiveRef.off(); 
            }

            currentLiveRef = database.ref('chats/' + roomKey);
            
            currentLiveRef.on('child_added', (snapshot) => {
                var msgKey = snapshot.key;
                var msg = snapshot.val();
                
                // प्रोफाइल डेटा को चैट मैसेजेस में दिखाने से रोकें
                if (msgKey === 'cust_profile' || !msg || !msg.sender) return;

                var newMsg = document.createElement('div');
                newMsg.id = "admin_msg_" + msgKey;
                
                if(msg.sender === "admin") {
                    newMsg.className = "message msg-right";
                    if(msg.text.includes('<img') || msg.text.startsWith('data:image')) {
                        if(msg.text.startsWith('data:image')) {
                            newMsg.innerHTML = `<img src="${msg.text}" class="chat-img-admin">`;
                        } else {
                            newMsg.innerHTML = msg.text;
                        }
                    } else {
                        newMsg.innerText = msg.text;
                    }
                } else {
                    newMsg.className = "message msg-left";
                    if(msg.fileType === "image" || msg.text.startsWith('data:image')) {
                        newMsg.innerHTML = `<img src="${msg.text}" class="chat-img-admin" style="cursor:pointer;" onclick="window.open('${msg.text}', '_blank')">`;
                    } else {
                        newMsg.innerText = msg.text;
                    }
                }
                
                chatWindow.appendChild(newMsg);
                chatWindow.scrollTop = chatWindow.scrollHeight; 
            });

            // यदि ग्राहक कोई संदेश डिलीट करता है तो एडमिन स्क्रीन से भी लाइव गायब होगा
            currentLiveRef.on('child_removed', (snapshot) => {
                var deletedDiv = document.getElementById("admin_msg_" + snapshot.key);
                if(deletedDiv) {
                    deletedDiv.remove();
                }
            });
        }

        function selectCustomer(id, name) {
            var items = document.getElementsByClassName('customer-item');
            for(var i=0; i<items.length; i++) { items[i].classList.remove('selected'); }

            var currentItem = document.getElementById(id);
            if(currentItem) currentItem.classList.add('selected');
            
            selectedCustomerId = id;
            selectedCustomerName = name;

            document.getElementById('topBlockBtn').style.display = 'block';
            document.getElementById('mainHeaderTitle').innerText = "चयनित: " + name;
        }

        function blockSelectedCustomer() {
            if(selectedCustomerId) {
                var actualRoomKey = selectedCustomerId.replace("room_", "");
                var confirmBlock = confirm("क्या आप सचमुच ग्राहक " + selectedCustomerName + " का पूरा फोल्डर हमेशा के लिए डिलीट करना चाहते हैं?");
                if(confirmBlock) {
                    database.ref('chats/' + actualRoomKey).remove().then(() => {
                        alert("ग्राहक का फोल्डर साफ़ कर दिया गया है!");
                        closeCustomerChat();
                    });
                }
            }
        }

        function resetAdminHeader() {
            selectedCustomerId = null;
            document.getElementById('topBlockBtn').style.display = 'none';
            document.getElementById('mainHeaderTitle').innerText = "MG ASTROLOGY - ADMIN";
        }

        function openCustomerChat(roomKey) {
            document.getElementById('chattingWithTitle').innerText = "कस्टमर: " + selectedCustomerName;
            document.getElementById('fullChatWindow').style.display = 'flex';
            listenToLiveMessages(roomKey); 
        }

        function closeCustomerChat() {
            if (currentLiveRef) {
                currentLiveRef.off(); 
                currentLiveRef = null;
            }
            document.getElementById('fullChatWindow').style.display = 'none';
            resetAdminHeader();
        }

        function sendPaymentWarning() {
            if(!selectedCustomerId) return;
            var actualRoomKey = selectedCustomerId.replace("room_", "");

            var warningText = '<img src="https://i.ibb.co/SDBfnhQy/Screenshot-20260517-164027-GPay-Business.jpg" class="qr-image-style" alt="GPay QR Code">' +
                              '<span style="color: #d32f2f; font-weight: bold; display: block;">⚠️ ध्यान दें: कृपया ऊपर दिए गए QR कोड पर भुगतान करके तुरंत स्क्रीनशॉट साझा करें, तभी आपकी बाकी रिपोर्ट आपको मिलेगी।</span>';
            
            var messageData = {
                sender: "admin",
                text: warningText,
                timestamp: Date.now()
            };

            database.ref('chats/' + actualRoomKey).push(messageData);
        }

        function openAdminGallery() {
            document.getElementById('adminGalleryInput').click();
        }

        function adminImageSelected() {
            if(!selectedCustomerId) return;
            var actualRoomKey = selectedCustomerId.replace("room_", "");

            var fileInput = document.getElementById('adminGalleryInput');
            if(fileInput.files.length > 0) {
                var file = fileInput.files[0];
                var reader = new FileReader();
                
                reader.onload = function(e) {
                    var base64Image = e.target.result;
                    var messageData = { 
                        sender: "admin", 
                        text: base64Image, 
                        timestamp: Date.now() 
                    };
                    database.ref('chats/' + actualRoomKey).push(messageData).then(() => {
                        fileInput.value = ""; 
                    });
                };
                reader.readAsDataURL(file);
            }
        }

        function adminSendMessage() {
            if(!selectedCustomerId) return;
            var actualRoomKey = selectedCustomerId.replace("room_", "");

            var input = document.getElementById('adminMsgInput');
            var text = input.value.trim();
            if(text === "") return;

            var messageData = {
                sender: "admin",
                text: text,
                timestamp: Date.now()
            };

            database.ref('chats/' + actualRoomKey).push(messageData)
            .then(() => {
                input.value = "";
            });
        }

        function filterCustomers() {
            var input = document.getElementById('adminSearchInput').value.toLowerCase();
            var items = document.getElementsByClassName('customer-item');
            for (var i = 0; i < items.length; i++) {
                var text = items[i].innerText.toLowerCase();
                if (text.includes(input)) {
                    items[i].style.display = "";
                } else {
                    items[i].style.display = "none";
                }
            }
        }

        document.body.addEventListener('click', function() {
            if(notificationSound) {
                notificationSound.play().then(() => {
                    notificationSound.pause();
                    notificationSound.currentTime = 0;
                }).catch(e => {});
            }
        }, {once: true});
    </script>

</body>
</html>
